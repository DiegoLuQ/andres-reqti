version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reqti_app
    volumes:
      - .:/var/www/html
    environment:
      - VIRTUAL_HOST=reqti.dpmc.cl
      - LETSENCRYPT_HOST=reqti.dpmc.cl
    networks:
      - red_produccion
    restart: always

networks:
  red_produccion:
    external: true